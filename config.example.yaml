# 精小弘 Go bot 示例配置。
app:
  # 是否开启调试模式。当前主要作为运行环境标记保留。
  debug: false
  # 日志级别，预期值：debug、info、warn、error。
  log_level: "info"
  # 应用默认时区。定时任务、日志和时间计算建议统一使用 Asia/Shanghai。
  timezone: "Asia/Shanghai"

server:
  # 反向 WebSocket fallback 的监听地址。
  # 默认情况下 bot 使用 onebot.ws_url 主动连接 NapCat；只有 onebot.ws_url 为空时才会监听该地址。
  addr: ":8080"

onebot:
  # NapCat OneBot 11 正向 WebSocket 地址。
  # compose 中 NapCat 默认把 3001 暴露到宿主机，因此本地单独运行 bot 时使用 127.0.0.1。
  # 注意：NapCat WebUI 里的 WebSocket server 监听地址应填 0.0.0.0，而不是 127.0.0.1。
  ws_url: "ws://127.0.0.1:3001"
  # OneBot 访问令牌，需要和 NapCat WebSocket 服务端配置的 token 完全一致。
  # bot 会在 WebSocket 握手和 API 调用中发送 Authorization: Bearer <access_token>。
  # 不建议留空；如果 NapCat 端配置了 token，这里留空会连接失败。
  access_token: "change-me"
  # bot 调用 OneBot API 等待响应的超时时间，单位秒。
  api_timeout_sec: 30
  # 正向 WebSocket 断开后的重连间隔，单位秒。
  reconnect_interval_sec: 5

wps:
  # WPS 在线表格下载入口，用于 /reload 或启动同步时下载知识库。
  # 优先填写网页端“右键文件 -> 导出文档链接”得到的链接，或可直接下载的 xlsx URL。
  # 普通 365.kdocs.cn/l/... 分享页通常返回 HTML 页面，不能直接作为 xlsx 导入。
  share_url: ""
  # WPS 登录态 sid。如果分享链接需要登录访问，需要填写；也可用 JXH_WPS_SID 覆盖。
  sid: ""
  # 要读取的 sheet 名称。旧项目默认使用 release。
  sheet: "release"
  # 下载后的 xlsx 本地缓存路径，便于排查导入问题。
  cache_file: "./data/cache/knowledge.xlsx"
  # WPS 请求超时时间，单位秒。WPS 导出接口偶尔较慢，过短会导致 /reload 等待响应头超时。
  timeout_sec: 120
  # 启动时是否自动从 WPS 同步一次知识库。share_url 为空时不会同步。
  sync_on_start: true

database:
  # MySQL 主机。compose 只启动依赖，bot 单独跑，所以默认连接宿主机暴露的 127.0.0.1:3306。
  host: "127.0.0.1"
  # MySQL 端口。
  port: 3306
  # MySQL 用户名。需要和 compose.yaml 的 MYSQL_USER 一致。
  user: "jxh"
  # MySQL 密码。需要和 compose.yaml 的 MYSQL_PASSWORD 一致；生产环境建议用 JXH_MYSQL_PASSWORD 覆盖。
  password: "jxh_password"
  # MySQL 数据库名。需要和 compose.yaml 的 MYSQL_DATABASE 一致。
  name: "jxh_bot"
  # MySQL 字符集。QQ/WPS 内容包含 emoji 和中文，必须使用 utf8mb4。
  charset: "utf8mb4"
  # 是否让 MySQL driver 自动解析 time.Time。
  parse_time: true
  # MySQL 时间位置。Local 会使用运行环境本地时区。
  loc: "Local"
  # 可选完整 DSN。非空时优先使用该字段，忽略上面的 host/port/user/password/name 等拆分字段。
  dsn: ""

ai:
  # 是否启用 /ai 入口。当前代码会创建 AI 服务；如果模型未配置，会使用抽取式 fallback。
  enabled: true
  # ChatModel 提供方。支持 openai 和 ark；空值按 openai 处理。
  provider: "openai"
  # ChatModel base_url。
  # openai 示例：https://api.openai.com/v1。
  # ark 可留空，默认使用 https://ark.cn-beijing.volces.com/api/v3；也可填自定义 Ark base_url。
  base_url: ""
  # ChatModel API Key，建议用 JXH_AI_API_KEY 注入。
  # ark provider 只支持 API Key，区域使用 Ark SDK 默认 cn-beijing。
  api_key: ""
  # ChatModel 名称。openai 填模型名；ark 填方舟推理接入点 ID，如 ep-xxxxxxxx。
  model: ""
  # 调用 ChatModel 的超时时间，单位秒。
  timeout_sec: 30
  # /ai 问题最大长度，超过后会截断，避免超长 prompt。
  max_question_chars: 500
  # 每次 RAG 检索送入 prompt 的知识条数。
  top_k: 5
  # 检索分数阈值。当前文本检索会使用该值过滤低相关知识。
  score_threshold: 0.1

event_dedupe:
  # processed_events 保留时间，单位小时。用于避免 NapCat 重连边界重复处理事件。
  retention_hours: 72
  # processed_events 清理任务间隔，单位小时。
  cleanup_interval_hours: 6

cache:
  # /ai 检索结果缓存 TTL，单位秒。设置为 0 可关闭缓存。
  ai_retrieval_ttl_sec: 300

quote:
  # 引用图服务地址。启用 quote profile 后默认映射到宿主机 5000。
  base_url: "http://127.0.0.1:5000"
  # 调用引用图服务超时时间，单位秒。
  timeout_sec: 10

scheduler:
  # 定时任务使用的时区。建议和 app.timezone 保持一致。
  timezone: "Asia/Shanghai"

debug:
  # 是否启用 /test 命令。生产环境可关闭。
  enable_test_command: true
